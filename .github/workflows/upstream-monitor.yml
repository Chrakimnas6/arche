name: Monitor Upstream Repos

on:
  schedule:
    - cron: '0 9 * * *' # daily at 9am UTC
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check upstream repos for changes
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA_FILE=".github/upstream-shas.json"
          CHANGES=""
          UPDATED_SHAS=$(cat "$SHA_FILE")

          check_repo() {
            local repo="$1"
            local stored_sha
            stored_sha=$(echo "$UPDATED_SHAS" | python3 -c "import sys,json; print(json.load(sys.stdin).get('$repo',''))")
            local latest_sha
            latest_sha=$(gh api "repos/$repo/commits/main" --jq '.sha' 2>/dev/null || \
                         gh api "repos/$repo/commits/master" --jq '.sha' 2>/dev/null || echo "")

            if [ -z "$latest_sha" ]; then
              echo "  WARNING: Could not fetch latest SHA for $repo"
              return
            fi

            if [ "$stored_sha" != "$latest_sha" ]; then
              # Get changed files
              local files
              files=$(gh api "repos/$repo/compare/${stored_sha}...${latest_sha}" \
                --jq '.files | map(.filename) | join("\n")' 2>/dev/null || echo "")

              # Get commit log
              local log
              log=$(gh api "repos/$repo/compare/${stored_sha}...${latest_sha}" \
                --jq '.commits | map("- " + (.commit.message | split("\n")[0])) | join("\n")' 2>/dev/null || echo "- (could not fetch commit details)")

              local count
              count=$(gh api "repos/$repo/compare/${stored_sha}...${latest_sha}" \
                --jq '.commits | length' 2>/dev/null || echo "?")

              # Get patch for relevant files (skills, principles, hooks)
              local patch
              patch=$(gh api "repos/$repo/compare/${stored_sha}...${latest_sha}" \
                --jq '[.files[] | select(.filename | test("skills/|principles/|hooks/|SKILL\\.md|AGENTS\\.md|CLAUDE\\.md")) | "--- " + .filename + " ---\n" + (.patch // "(binary or too large)")] | join("\n\n")' 2>/dev/null || echo "")

              CHANGES="${CHANGES}
          ### ${repo} (${count} new commits)

          **Commits:**
          ${log}

          **Changed files:**
          ${files}

          **Relevant diffs:**
          ${patch}

          ---
          "

              # Update SHA in memory
              UPDATED_SHAS=$(echo "$UPDATED_SHAS" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          data['$repo'] = '$latest_sha'
          print(json.dumps(data, indent=2))
          ")
            fi
          }

          check_repo "poteto/noodle"
          check_repo "garrytan/gstack"
          check_repo "mattpocock/skills"
          check_repo "obra/superpowers"

          if [ -n "$CHANGES" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "$UPDATED_SHAS" > "$SHA_FILE"
            printf '%s' "$CHANGES" > /tmp/upstream_changes.txt
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Analyze changes with Claude
        if: steps.check.outputs.has_changes == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          CONTEXT=$(cat .github/upstream-context.md)
          CHANGES=$(cat /tmp/upstream_changes.txt)

          # Build the prompt
          cat > /tmp/analysis_prompt.json << 'PROMPT_EOF'
          {
            "model": "claude-haiku-4-5-20251001",
            "max_tokens": 4096,
            "messages": [
              {
                "role": "user",
                "content": "UPSTREAM_PLACEHOLDER"
              }
            ]
          }
          PROMPT_EOF

          # Construct the message content
          MESSAGE="You are analyzing upstream repository changes for a vibe coding setup template repo.

          ## Your Context (what our repo contains and how it maps to upstream)

          ${CONTEXT}

          ## Upstream Changes Since Last Check

          ${CHANGES}

          ## Your Task

          Analyze these changes and produce a structured response:

          1. **VERDICT**: Either \`SKIP\` (no relevant changes, do not create a PR) or \`UPDATE\` (relevant changes found, create a PR)

          2. If VERDICT is UPDATE, provide:
             - **Summary**: 2-3 sentence overview of what changed that matters
             - **Recommendations**: For each relevant change, specify:
               - Which file in our repo to update
               - What to change and why
               - Priority: HIGH (methodology change) / MEDIUM (useful improvement) / LOW (nice to have)

          3. If VERDICT is SKIP, provide a one-line reason why.

          Be conservative — only recommend UPDATE for changes that meaningfully improve our skills or principles. Infrastructure, telemetry, web-specific, and framework-specific changes should be skipped."

          # Use python to make the API call (avoids JSON escaping issues in bash)
          python3 << 'PYEOF'
          import json, os, urllib.request, urllib.error

          api_key = os.environ["ANTHROPIC_API_KEY"]
          message = open("/dev/stdin", "r").read() if False else ""

          # Read the message from the constructed content
          with open("/tmp/upstream_changes.txt") as f:
              changes = f.read()
          with open(".github/upstream-context.md") as f:
              context = f.read()

          prompt = f"""You are analyzing upstream repository changes for a vibe coding setup template repo.

          ## Your Context (what our repo contains and how it maps to upstream)

          {context}

          ## Upstream Changes Since Last Check

          {changes}

          ## Your Task

          Analyze these changes and produce a structured response:

          1. **VERDICT**: Either `SKIP` (no relevant changes, do not create a PR) or `UPDATE` (relevant changes found, create a PR)

          2. If VERDICT is UPDATE, provide:
             - **Summary**: 2-3 sentence overview of what changed that matters
             - **Recommendations**: For each relevant change, specify:
               - Which file in our repo to update
               - What to change and why
               - Priority: HIGH (methodology change) / MEDIUM (useful improvement) / LOW (nice to have)

          3. If VERDICT is SKIP, provide a one-line reason why.

          Be conservative — only recommend UPDATE for changes that meaningfully improve our skills or principles. Infrastructure, telemetry, web-specific, and framework-specific changes should be skipped."""

          payload = {
              "model": "claude-haiku-4-5-20251001",
              "max_tokens": 4096,
              "messages": [{"role": "user", "content": prompt}]
          }

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=json.dumps(payload).encode(),
              headers={
                  "Content-Type": "application/json",
                  "x-api-key": api_key,
                  "anthropic-version": "2023-06-01"
              }
          )

          try:
              with urllib.request.urlopen(req) as resp:
                  result = json.loads(resp.read())
                  analysis = result["content"][0]["text"]
          except urllib.error.HTTPError as e:
              analysis = f"API call failed: {e.code} {e.read().decode()}"

          with open("/tmp/analysis.md", "w") as f:
              f.write(analysis)

          # Check verdict
          verdict = "UPDATE" if "VERDICT" in analysis and "UPDATE" in analysis.split("VERDICT")[1][:50] else "SKIP"
          with open("/tmp/verdict.txt", "w") as f:
              f.write(verdict)
          PYEOF

          echo "verdict=$(cat /tmp/verdict.txt)" >> "$GITHUB_OUTPUT"

      - name: Create PR if analysis recommends update
        if: steps.check.outputs.has_changes == 'true' && steps.check.outputs.verdict != 'SKIP'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if verdict file exists and says UPDATE
          if [ -f /tmp/verdict.txt ] && [ "$(cat /tmp/verdict.txt)" = "SKIP" ]; then
            echo "Analysis says SKIP — no PR needed"
            exit 0
          fi

          BRANCH="upstream-changes-$(date +%Y%m%d)"

          # Check if branch already exists
          if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
            BRANCH="upstream-changes-$(date +%Y%m%d-%H%M)"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add .github/upstream-shas.json
          git commit -m "chore: update upstream SHA tracking

          Upstream repos have new commits. See PR description for analysis."

          git push origin "$BRANCH"

          # Build PR body from analysis
          ANALYSIS=$(cat /tmp/analysis.md)
          cat > /tmp/pr_body.md << EOF
          ## Upstream Change Analysis

          ${ANALYSIS}

          ---
          *Analyzed by Claude Haiku. Review recommendations and apply changes manually or with Claude Code.*
          EOF

          gh pr create \
            --title "chore: upstream changes — review recommendations ($(date +%Y-%m-%d))" \
            --body-file /tmp/pr_body.md \
            --base main \
            --head "$BRANCH"

      - name: Update SHAs even if skipped
        if: steps.check.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # If we skipped the PR, still update SHAs on main so we don't re-analyze the same changes
          if [ -f /tmp/verdict.txt ] && [ "$(cat /tmp/verdict.txt)" = "SKIP" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .github/upstream-shas.json
            git commit -m "chore: update upstream SHA tracking (no relevant changes)" || true
            git push origin main || true
          fi
